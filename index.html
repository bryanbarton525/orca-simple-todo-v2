<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Todo List</h1>
  <div id="add-todo">
    <input type="text" id="new-todo" placeholder="New todo" />
    <select id="new-category">
      <option value="Work">Work</option>
      <option value="Personal">Personal</option>
    </select>
    <button id="add-btn">Add</button>
  </div>
  <div id="filters">
    <label><input type="checkbox" value="Work" class="filter" checked> Work</label>
    <label><input type="checkbox" value="Personal" class="filter" checked> Personal</label>
  </div>
  <ul id="todo-list"></ul>
  <script src="script.js"></script>
</body>
</html>
